locale: en-US
title: Richard Cheam
description: Minimal personal website for Richard Cheam.
url: https://richardcheam.github.io
baseurl: ""
timezone: Europe/Paris

markdown: kramdown
permalink: pretty

collections:
  notes:
    output: true
    permalink: /notes/:path/

plugins:
  - jekyll-feed
  - jekyll-sitemap

include:
  - _pages

exclude:
  - node_modules
  - vendor
  - package.json
  - package-lock.json
  - Dockerfile
  - CONTRIBUTING.md

defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: default
  - scope:
      path: "_notes"
      type: notes
    values:
      layout: default
