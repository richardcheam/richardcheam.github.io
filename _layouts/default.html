<!doctype html>
<html lang="{{ site.locale | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.url == '/' %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | escape }}">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script>
      (function () {
        var root = document.documentElement;
        root.classList.add("js");

        var themeKey = "theme";
        var savedTheme = null;

        try {
          savedTheme = localStorage.getItem(themeKey);
        } catch (e) {
          savedTheme = null;
        }

        if (savedTheme === "light" || savedTheme === "dark") {
          root.setAttribute("data-theme", savedTheme);
        }

        document.addEventListener("DOMContentLoaded", function () {
          var toggle = document.getElementById("theme-toggle");
          var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var themeMeta = document.querySelector('meta[name="theme-color"]');

          function prefersDark() {
            return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          }

          function isDarkTheme() {
            var explicit = root.getAttribute("data-theme");
            if (explicit === "dark") return true;
            if (explicit === "light") return false;
            return prefersDark();
          }

          function refreshThemeUi() {
            if (themeMeta) {
              themeMeta.setAttribute("content", isDarkTheme() ? "#0d0d0d" : "#ffffff");
            }

            if (toggle) {
              var nextLabel = isDarkTheme() ? "Light" : "Dark";
              toggle.textContent = nextLabel;
              toggle.setAttribute("aria-label", "Switch to " + nextLabel + " mode");
            }
          }

          if (toggle) {
            toggle.addEventListener("click", function () {
              var next = isDarkTheme() ? "light" : "dark";
              root.setAttribute("data-theme", next);
              try {
                localStorage.setItem(themeKey, next);
              } catch (e) {}
              refreshThemeUi();
            });
          }

          refreshThemeUi();

          var revealTargets = Array.prototype.slice.call(document.querySelectorAll("[data-reveal]"));
          if (revealTargets.length > 0) {
            revealTargets.forEach(function (target, index) {
              target.style.setProperty("--reveal-index", index % 8);
            });

            if (reduceMotion || typeof IntersectionObserver === "undefined") {
              revealTargets.forEach(function (target) {
                target.classList.add("is-visible");
              });
            } else {
              var revealObserver = new IntersectionObserver(
                function (entries, observer) {
                  entries.forEach(function (entry) {
                    if (!entry.isIntersecting) return;
                    entry.target.classList.add("is-visible");
                    observer.unobserve(entry.target);
                  });
                },
                {
                  threshold: 0.15,
                  rootMargin: "0px 0px -8% 0px"
                }
              );

              revealTargets.forEach(function (target) {
                revealObserver.observe(target);
              });
            }
          }

          var tabGroups = Array.prototype.slice.call(document.querySelectorAll("[data-detail-tabs]"));
          tabGroups.forEach(function (group) {
            var triggers = Array.prototype.slice.call(group.querySelectorAll("[data-detail-trigger]"));
            var panels = Array.prototype.slice.call(group.querySelectorAll("[data-detail-panel]"));
            if (triggers.length === 0 || panels.length === 0) return;

            function activate(panelId) {
              var hasActive = false;

              panels.forEach(function (panel) {
                var isActive = panel.id === panelId;
                panel.hidden = !isActive;
                panel.classList.toggle("is-active", isActive);
                if (isActive) hasActive = true;
              });

              triggers.forEach(function (trigger) {
                var targetId = (trigger.getAttribute("href") || "").replace(/^#/, "");
                var isActive = targetId === panelId;
                trigger.classList.toggle("is-active", isActive);
                trigger.setAttribute("aria-current", isActive ? "true" : "false");
              });

              return hasActive;
            }

            triggers.forEach(function (trigger) {
              trigger.addEventListener("click", function (event) {
                var targetId = (trigger.getAttribute("href") || "").replace(/^#/, "");
                if (!targetId) return;
                event.preventDefault();
                if (!activate(targetId)) return;
                if (window.history && window.history.replaceState) {
                  window.history.replaceState(null, "", "#" + targetId);
                }
              });
            });

            var hash = (window.location.hash || "").replace(/^#/, "");
            var fallback = (triggers[0].getAttribute("href") || "").replace(/^#/, "");
            if (!activate(hash)) {
              activate(fallback);
            }
          });

          var filterInput = document.querySelector("[data-filter-input]");
          var filterCards = Array.prototype.slice.call(document.querySelectorAll("[data-filter-card]"));
          var filterEmpty = document.querySelector("[data-filter-empty]");

          if (filterInput && filterCards.length > 0) {
            function applyFilter() {
              var query = filterInput.value.trim().toLowerCase();
              var matches = 0;

              filterCards.forEach(function (card) {
                var haystack = (card.getAttribute("data-filter-text") || "").toLowerCase();
                var show = query === "" || haystack.indexOf(query) !== -1;
                card.hidden = !show;
                if (show) matches += 1;
              });

              if (filterEmpty) {
                filterEmpty.hidden = query === "" || matches > 0;
              }
            }

            filterInput.addEventListener("input", applyFilter);
            applyFilter();
          }

          document.body.classList.add("page-ready");
        });
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary">
          {% for link in site.data.navigation.main %}
            <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
          {% endfor %}
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch color mode">Dark</button>
      </div>
    </header>

    <main class="site-main">
      {% if page.url != '/' and page.title %}
        <header class="page-heading" data-reveal>
          <h1>{{ page.title }}</h1>
        </header>
      {% endif %}
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>
  </body>
</html>
