<!doctype html>
<html lang="{{ site.locale | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.url == '/' %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | escape }}">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script>
      (function () {
        var root = document.documentElement;
        var key = "theme";
        var saved = null;

        try {
          saved = localStorage.getItem(key);
        } catch (e) {
          saved = null;
        }

        if (saved === "light" || saved === "dark") {
          root.setAttribute("data-theme", saved);
        }

        function isDarkNow() {
          var explicit = root.getAttribute("data-theme");
          if (explicit === "light") return false;
          if (explicit === "dark") return true;
          return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        }

        function updateThemeColor() {
          var meta = document.querySelector('meta[name="theme-color"]');
          if (!meta) return;
          meta.setAttribute("content", isDarkNow() ? "#000000" : "#ffffff");
        }

        document.addEventListener("DOMContentLoaded", function () {
          var toggle = document.getElementById("theme-toggle");
          var body = document.body;
          var intro = document.getElementById("intro-screen");
          var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function updateToggleText() {
            if (!toggle) return;
            toggle.textContent = isDarkNow() ? "Light" : "Dark";
          }

          updateToggleText();
          updateThemeColor();

          if (toggle) {
            toggle.addEventListener("click", function () {
              var next = isDarkNow() ? "light" : "dark";
              root.setAttribute("data-theme", next);
              try {
                localStorage.setItem(key, next);
              } catch (e) {}
              updateToggleText();
              updateThemeColor();
            });
          }

          var media = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
          if (media && media.addEventListener) {
            media.addEventListener("change", function () {
              var explicit = root.getAttribute("data-theme");
              if (!explicit) {
                updateToggleText();
                updateThemeColor();
              }
            });
          }

          window.setTimeout(function () {
            body.classList.remove("intro-pending");
            body.classList.add("intro-complete");
            if (intro) {
              window.setTimeout(function () {
                intro.remove();
              }, reduceMotion ? 120 : 1600);
            }
          }, reduceMotion ? 80 : 1900);
        });
      })();
    </script>
  </head>
  <body class="intro-pending">
    <div id="intro-screen" class="intro-screen" aria-hidden="true">
      <p class="intro-screen__name">{{ site.title }}</p>
    </div>

    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary">
          {% for link in site.data.navigation.main %}
            <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
          {% endfor %}
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">Dark</button>
      </div>
    </header>

    <main class="site-main">
      {% if page.url != '/' and page.title %}
        <h1>{{ page.title }}</h1>
      {% endif %}
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}.</p>
    </footer>
  </body>
</html>
