<!doctype html>
<html lang="{{ site.locale | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.url == '/' %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | escape }}">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script>
      (function () {
        var root = document.documentElement;
        root.classList.add("js");
        var key = "theme";
        var saved = null;

        try {
          saved = localStorage.getItem(key);
        } catch (e) {
          saved = null;
        }

        if (saved === "light" || saved === "dark") {
          root.setAttribute("data-theme", saved);
        }

        function isDarkNow() {
          var explicit = root.getAttribute("data-theme");
          if (explicit === "light") return false;
          if (explicit === "dark") return true;
          return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        }

        function updateThemeColor() {
          var meta = document.querySelector('meta[name="theme-color"]');
          if (!meta) return;
          meta.setAttribute("content", isDarkNow() ? "#000000" : "#ffffff");
        }

        document.addEventListener("DOMContentLoaded", function () {
          var toggle = document.getElementById("theme-toggle");
          var body = document.body;
          var intro = document.getElementById("intro-screen");
          var progressBar = document.getElementById("scroll-progress-bar");
          var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var introSeenKey = "intro_seen_v2";
          var introSeen = false;

          try {
            introSeen = localStorage.getItem(introSeenKey) === "1";
          } catch (e) {
            introSeen = false;
          }

          function updateToggleText() {
            if (!toggle) return;
            toggle.textContent = isDarkNow() ? "Light" : "Dark";
          }

          updateToggleText();
          updateThemeColor();

          if (toggle) {
            toggle.addEventListener("click", function () {
              var next = isDarkNow() ? "light" : "dark";
              root.setAttribute("data-theme", next);
              try {
                localStorage.setItem(key, next);
              } catch (e) {}
              updateToggleText();
              updateThemeColor();
            });
          }

          var media = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
          if (media && media.addEventListener) {
            media.addEventListener("change", function () {
              var explicit = root.getAttribute("data-theme");
              if (!explicit) {
                updateToggleText();
                updateThemeColor();
              }
            });
          }

          function initCinematicMotion() {
            var revealTargets = Array.prototype.slice.call(
              document.querySelectorAll(
                ".site-main > *:not(script), .minimal-hero, .minimal-project, .minimal-card, .minimal-note, .concept-card, .notes-route, .detail-nav, .detail-block, .detail-metric"
              )
            );
            var uniqueTargets = [];
            var seen = typeof Set !== "undefined" ? new Set() : null;

            revealTargets.forEach(function (target) {
              if (!target) return;
              if (seen) {
                if (seen.has(target)) return;
                seen.add(target);
              }
              target.classList.add("cinematic-reveal");
              uniqueTargets.push(target);
            });

            if (reduceMotion || typeof IntersectionObserver === "undefined") {
              uniqueTargets.forEach(function (target) {
                target.classList.add("is-visible");
              });
              return;
            }

            uniqueTargets.forEach(function (target, index) {
              target.style.setProperty("--reveal-index", index % 7);
            });

            var revealObserver = new IntersectionObserver(
              function (entries, observer) {
                entries.forEach(function (entry) {
                  if (!entry.isIntersecting) return;
                  entry.target.classList.add("is-visible");
                  observer.unobserve(entry.target);
                });
              },
              {
                threshold: 0.16,
                rootMargin: "0px 0px -8% 0px"
              }
            );

            uniqueTargets.forEach(function (target) {
              revealObserver.observe(target);
            });
          }

          function initDetailTabs() {
            var groups = Array.prototype.slice.call(document.querySelectorAll("[data-detail-tabs]"));
            if (groups.length === 0) return;

            groups.forEach(function (group) {
              var triggers = Array.prototype.slice.call(group.querySelectorAll("[data-detail-trigger]"));
              var panels = Array.prototype.slice.call(group.querySelectorAll("[data-detail-panel]"));
              if (triggers.length === 0 || panels.length === 0) return;

              function activate(panelId) {
                var hasActive = false;

                panels.forEach(function (panel) {
                  var isActive = panel.id === panelId;
                  panel.hidden = !isActive;
                  panel.classList.toggle("is-active", isActive);
                  if (isActive) hasActive = true;
                });

                triggers.forEach(function (trigger) {
                  var targetId = (trigger.getAttribute("href") || "").replace(/^#/, "");
                  var isActive = targetId === panelId;
                  trigger.classList.toggle("is-active", isActive);
                  trigger.setAttribute("aria-current", isActive ? "true" : "false");
                });

                return hasActive;
              }

              triggers.forEach(function (trigger) {
                trigger.addEventListener("click", function (event) {
                  var targetId = (trigger.getAttribute("href") || "").replace(/^#/, "");
                  if (!targetId) return;
                  event.preventDefault();
                  if (!activate(targetId)) return;
                  if (window.history && window.history.replaceState) {
                    window.history.replaceState(null, "", "#" + targetId);
                  }
                });
              });

              var initialHash = (window.location.hash || "").replace(/^#/, "");
              var firstId = (triggers[0].getAttribute("href") || "").replace(/^#/, "");
              if (!activate(initialHash)) {
                activate(firstId);
              }
            });
          }

          function updateScrollProgress() {
            if (!progressBar) return;
            var doc = document.documentElement;
            var scrollTop = window.pageYOffset || doc.scrollTop || 0;
            var maxScroll = Math.max(0, doc.scrollHeight - window.innerHeight);
            var progress = maxScroll > 0 ? Math.min(1, scrollTop / maxScroll) : 0;
            progressBar.style.transform = "scaleY(" + progress.toFixed(4) + ")";
          }

          function initCursorAmbience() {
            if (reduceMotion) return;
            if (window.matchMedia && window.matchMedia("(pointer: coarse)").matches) return;

            var currentX = window.innerWidth * 0.5;
            var currentY = window.innerHeight * 0.28;
            var targetX = currentX;
            var targetY = currentY;

            function render() {
              currentX += (targetX - currentX) * 0.08;
              currentY += (targetY - currentY) * 0.08;
              root.style.setProperty("--cursor-x", currentX.toFixed(1) + "px");
              root.style.setProperty("--cursor-y", currentY.toFixed(1) + "px");
              window.requestAnimationFrame(render);
            }

            window.addEventListener("mousemove", function (event) {
              targetX = event.clientX;
              targetY = event.clientY;
            });

            render();
          }

          initDetailTabs();
          initCinematicMotion();
          updateScrollProgress();
          window.addEventListener("scroll", updateScrollProgress, { passive: true });
          window.addEventListener("resize", updateScrollProgress);
          initCursorAmbience();

          if (introSeen || reduceMotion) {
            body.classList.remove("intro-pending");
            body.classList.add("intro-complete");
            if (intro) intro.remove();
          } else {
            window.setTimeout(function () {
              body.classList.remove("intro-pending");
              body.classList.add("intro-complete");
              try {
                localStorage.setItem(introSeenKey, "1");
              } catch (e) {}
              if (intro) {
                window.setTimeout(function () {
                  intro.remove();
                }, 1220);
              }
            }, 1650);
          }
        });
      })();
    </script>
  </head>
  <body class="intro-pending">
    <div class="cinematic-noise" aria-hidden="true"></div>
    <div class="cinematic-progress" aria-hidden="true"><span id="scroll-progress-bar"></span></div>
    <div id="intro-screen" class="intro-screen" aria-hidden="true">
      <p class="intro-screen__name">{{ site.title }}</p>
    </div>

    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary">
          {% for link in site.data.navigation.main %}
            <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
          {% endfor %}
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">Dark</button>
      </div>
    </header>

    <main class="site-main">
      {% if page.url != '/' and page.title %}
        <h1>{{ page.title }}</h1>
      {% endif %}
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}.</p>
    </footer>
    <script>
      (function () {
        var searchInput = document.getElementById("notes-search-input");
        var cards = document.querySelectorAll(".notes-category-card");
        var emptyMessage = document.querySelector(".notes-search-empty");

        if (!searchInput || cards.length === 0) return;

        function updateVisibility() {
          var query = searchInput.value.trim().toLowerCase();
          var matched = 0;

          cards.forEach(function (card) {
            var haystack =
              ((card.dataset.label || "") + " " + (card.dataset.summary || "") + " " + (card.dataset.count || "")).toLowerCase();
            var matches = query === "" || haystack.indexOf(query) !== -1;
            card.hidden = !matches;
            if (matches) matched += 1;
          });

          if (emptyMessage) {
            emptyMessage.hidden = query === "" || matched > 0;
          }
        }

        searchInput.addEventListener("input", updateVisibility);
        updateVisibility();
      })();
    </script>
  </body>
</html>
